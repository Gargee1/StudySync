{% extends 'planner/layout.html' %}

{% block body %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-xl-6 col-lg-7 col-md-9 col-12 text-center">

            <h1 class="mb-3">Hey!</h1>

            <p class="lead">
                Ready to plan your day and stay on top of your study goals?
            </p>

            <p class="lead">
                Create a group, add tasks, and get things done —
                <span class="fw-bold text-primary">together</span>.
            </p>

            {% if user.is_authenticated %}
                <a href="{% url 'circles' %}"
                   class="btn btn-primary btn-lg mt-4 w-100 w-md-auto">
                    Go to my study circles
                </a>
            {% else %}
                <a href="{% url 'login' %}"
                   class="btn btn-primary btn-lg mt-4 w-100 w-md-auto">
                    Get started
                </a>
            {% endif %}

        </div>

    </div>

</div>

{% endblock %}
