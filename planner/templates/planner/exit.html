{% extends 'planner/layout.html' %}

{% block body %}

<div class="container mt-4">

    <h2 class="mb-4">Exit a Circle</h2>

    {% if circles %}

        <div class="row">

            {% for circle in circles %}
            <div class="col-md-6 col-lg-4 mb-4">

                <div class="card shadow-sm h-100">

                    <div class="card-body">

                        <h5 class="card-title">
                            {{ circle.name }}
                        </h5>

                        <p class="text-muted mb-4">
                            Leave this study circle.
                        </p>

                        <form method="POST">
                            {% csrf_token %}

                            <input
                                type="hidden"
                                name="c_id"
                                value="{{ circle.id }}"
                            >

                            <button
                                type="submit"
                                class="btn btn-outline-danger btn-block"
                                onclick="return confirm('Are you sure you want to exit this circle?');">

                                Exit Circle

                            </button>

                        </form>

                    </div>

                </div>

            </div>
            {% endfor %}

        </div>

    {% else %}

        <div class="alert alert-info">
            You haven't joined any circles yet.
        </div>

    {% endif %}

    <a href="{% url 'circles' %}" class="btn btn-secondary">
        Back
    </a>

</div>

{% endblock %}
