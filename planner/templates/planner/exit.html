{% extends 'planner/layout.html' %}

{% block body %}

<div class="container mt-4">

    <h2 class="mb-4">Your Circles</h2>

    {% if circles %}

    <div class="row">
        <div class="col-xl-5 col-lg-6 col-md-8 col-12">

            <form method="POST" class="mb-4">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="circle" class="form-label fw-bold">
                        Select a circle:
                    </label>

                    <select name="c_id" id="circle"
                            class="form-select" required>

                        <option value="" disabled
                            {% if not selected_circle %}selected{% endif %}>
                            -- Choose a circle --
                        </option>

                        {% for circle in circles %}
                        <option value="{{ circle.id }}"
                            {% if selected_circle == circle.id %}selected{% endif %}>
                            {{ circle.name }}
                        </option>
                        {% endfor %}

                    </select>
                </div>

                <button type="submit"
                        class="btn btn-danger w-100"
                        onclick="return confirm('Are you sure you want to exit this circle? This cannot be undone.');">
                    Exit Circle
                </button>

            </form>

        </div>
    </div>

    {% else %}
        <p class="text-muted">You haven't joined any circles yet.</p>
    {% endif %}

</div>

{% endblock %}
